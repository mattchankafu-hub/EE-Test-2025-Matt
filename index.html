<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>電工模擬試題練習系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* === 基礎深色模式設定 === */
        body {
            background-color: #0e1117; color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center;
        }
        .container {
            width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box;
        }
        
        /* === 標題與選單列 === */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header h3 { margin: 0; font-size: 20px; }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        /* === 考試計時器 === */
        #timerContainer {
            background-color: #ef4444; color: white; text-align: center;
            padding: 8px; border-radius: 8px; margin-bottom: 15px;
            font-weight: bold; font-size: 16px; letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* === 題目區 === */
        .question-title { font-size: 16px; font-weight: bold; color: #a0a0a0; margin-bottom: 5px; }
        .question-text { font-size: 18px; font-weight: bold; line-height: 1.5; margin-bottom: 20px; }

        /* === 選項按鈕 === */
        .option-btn {
            display: block; width: 100%;
            background-color: #262730; border: 1px solid #3a3b45; color: white;
            padding: 10px 14px; border-radius: 8px; margin-bottom: 12px;
            font-size: 16px; font-weight: 500; cursor: pointer;
            text-align: left; transition: 0.2s; box-sizing: border-box;
        }
        .option-btn:hover { border-color: #ffffff; }
        
        /* 狀態顏色 */
        .opt-correct { background-color: #2e7d32 !important; border-color: #1b5e20 !important; cursor: default; text-align: center;}
        .opt-wrong { background-color: #d32f2f !important; border-color: #b71c1c !important; cursor: default; text-align: center;}
        .opt-selected { background-color: #3b82f6 !important; border-color: #60a5fa !important; text-align: center;}
        .opt-disabled { cursor: default; opacity: 0.8; }
        .opt-center { text-align: center; } 

        /* === 導航按鈕區 === */
        .nav-container { display: flex; justify-content: space-between; margin-top: 15px; margin-bottom: 15px; }
        .nav-btn {
            width: 48%; background-color: #262730; border: 1px solid #3a3b45; color: white;
            padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer;
        }
        .nav-btn:hover { border-color: #ffffff; }

        /* === 進度條 === */
        .progress-text { font-size: 14px; color: #a0a0a0; margin-bottom: 5px; }
        .progress-bar-bg { width: 100%; background-color: #262730; border-radius: 4px; height: 8px; }
        .progress-bar-fill { background-color: #3b82f6; height: 100%; border-radius: 4px; transition: width 0.3s; }

        /* === 側邊選單 === */
        .sidebar {
            height: 100%; width: 260px; position: fixed; top: 0; right: -260px;
            background-color: #1e1e24; transition: 0.3s; padding-top: 50px;
            box-shadow: -2px 0 5px rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;
        }
        .sidebar h3 { text-align: center; margin-top: 0; font-size: 18px;}
        
        /* 排除 close-btn，讓其他按鈕保持大按鈕樣式 */
        .sidebar select, .sidebar button:not(.close-btn) {
            width: 90%; margin: 8px 5%; padding: 10px; font-size: 15px; border-radius: 5px; box-sizing: border-box;
        }
        .sidebar button:not(.close-btn) { background-color: #3b82f6; color: white; border: none; cursor: pointer; font-weight: bold;}
        .btn-exam { background-color: #ef4444 !important; }
        .btn-exam:hover { background-color: #dc2626 !important; }
        
        /* 專屬關閉按鈕樣式：乾淨、靠右、透明 */
        .close-btn {
            position: absolute; top: 10px; right: 15px; font-size: 28px;
            color: #a0a0a0; background: transparent; border: none; cursor: pointer;
            padding: 5px; line-height: 1; transition: 0.2s;
        }
        .close-btn:hover { color: #ffffff; }
        
        hr { border: 0; border-top: 1px solid #3a3b45; margin: 10px 0 15px 0; }
        
        /* 隱藏區塊用 */
        .hidden { display: none !important; }
        .result-box { background-color: #262730; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .result-correct { border-left: 5px solid #2e7d32; }
        .result-wrong { border-left: 5px solid #d32f2f; }
        .result-miss { border-left: 5px solid #f59e0b; }
    </style>
</head>
<body>

<div id="sidebar" class="sidebar">
    <button class="close-btn" onclick="toggleSidebar()">×</button>
    
    <h3>⚙️ 練習模式 (即時解答)</h3>
    <select id="rangeSelect"></select>
    <button onclick="startPracticeMode()">開始循序練習</button>
    
    <hr style="margin-top: 20px;">

    <h3>📝 考試模式 (模擬測驗)</h3>
    <button class="btn-exam" onclick="startExamMode()">⏱️ 開始 60 分鐘模擬考</button>
    <p style="font-size: 12px; color: #a0a0a0; text-align: center; padding: 0 15px; line-height: 1.5;">
        從題庫中隨機抽取 100 題。<br>作答期間可修改答案，不會提示對錯，時間到自動交卷。
    </p>
</div>

<div class="container">
    <div class="header">
        <h3 style="font-size: 18px; font-weight: bold;">⚡ 電工模擬試題</h3>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    </div>

    <div id="loadingView">
        <p>🔄 正在載入題庫，請稍候...</p>
    </div>

    <div id="quizView" class="hidden">
        <div id="timerContainer" class="hidden">
            <span id="timerText">⏳ 剩餘時間: 60分 00秒</span>
        </div>

        <div class="question-title" id="qNum">第 0 題</div>
        <div class="question-text" id="qText">載入中...</div>
        
        <div id="optionsContainer"></div>

        <hr style="margin-top: 5px; margin-bottom: 10px;">

        <div class="nav-container">
            <button class="nav-btn" id="btnPrev" onclick="prevQuestion()">⬅️ 上一題</button>
            <button class="nav-btn" id="btnNext" onclick="nextQuestion()">下一題 ➡️</button>
        </div>

        <div class="progress-text" id="progressText">進度： 0 / 0</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>

    <div id="resultView" class="hidden">
        <h2 style="color: #4ade80;" id="resultTitle">🎉 測驗結束！</h2>
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <div><h3>答對題數</h3><h2 id="scoreText">0 / 0</h2></div>
            <div><h3>準確率</h3><h2 id="percentText">0%</h2></div>
        </div>
        <hr>
        <h3>📋 詳細對錯報告</h3>
        <div id="reportContainer"></div>
        <button class="nav-btn" style="width: 100%; margin-top: 20px;" onclick="viewLastQuestion()">⬅️ 返回考卷進行複習</button>
    </div>
</div>

<script>
    // === 核心變數 ===
    const CSV_FILE_NAME = "EE Quiz CSV-8.csv"; 
    let allQuestions = [];
    let currentQuestions = [];
    let state = {
        mode: 'practice', 
        examFinished: false, 
        examEndTime: null, 
        currentIndex: 0,
        answers: {}, 
        selectedRange: "1-50"
    };
    let timerInterval = null;

    // === 初始化與讀取 CSV ===
    window.onload = function() {
        Papa.parse(CSV_FILE_NAME, {
            download: true,
            header: true,
            complete: function(results) {
                allQuestions = results.data.filter(row => row['題號'] && row['題目']); 
                buildRangeSelector();
                loadProgress(); 
            },
            error: function(err) {
                document.getElementById('loadingView').innerHTML = "<p style='color:red;'>讀取失敗，請確認 CSV 檔案存在於 GitHub 中且檔名正確。</p>";
            }
        });
    };

    function buildRangeSelector() {
        const select = document.getElementById('rangeSelect');
        const limit = Math.min(allQuestions.length, 400);
        for (let i = 0; i < limit; i += 50) {
            let start = i + 1;
            let end = Math.min(i + 50, limit);
            let option = document.createElement('option');
            option.value = `${start}-${end}`;
            option.text = `${start}-${end} 題`;
            select.appendChild(option);
        }
    }

    // === 記憶功能 ===
    function saveProgress() {
        localStorage.setItem('EE_Quiz_Progress_V2', JSON.stringify(state));
        localStorage.setItem('EE_Quiz_Questions_V2', JSON.stringify(currentQuestions));
    }

    function loadProgress() {
        const savedState = localStorage.getItem('EE_Quiz_Progress_V2');
        const savedQuestions = localStorage.getItem('EE_Quiz_Questions_V2');
        
        if (savedState && savedQuestions) {
            state = JSON.parse(savedState);
            currentQuestions = JSON.parse(savedQuestions);
            document.getElementById('rangeSelect').value = state.selectedRange;
            
            if (state.mode === 'exam' && !state.examFinished) {
                let now = new Date().getTime();
                if (now >= state.examEndTime) {
                    state.examFinished = true; 
                }
            }
            
            document.getElementById('loadingView').classList.add('hidden');
            document.getElementById('resultView').classList.add('hidden');
            document.getElementById('quizView').classList.remove('hidden');
            
            if (state.mode === 'exam' && !state.examFinished) startTimer();
            renderQuestion();
        } else {
            document.getElementById('loadingView').classList.add('hidden');
            toggleSidebar(); 
        }
    }

    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sb.style.right = sb.style.right === '0px' ? '-260px' : '0px';
    }

    // === 模式控制 ===
    function startPracticeMode() {
        state.mode = 'practice';
        state.examFinished = false;
        state.selectedRange = document.getElementById('rangeSelect').value;
        state.currentIndex = 0;
        state.answers = {};
        
        let parts = state.selectedRange.split('-');
        let startIdx = parseInt(parts[0]) - 1;
        let endIdx = parseInt(parts[1]);
        currentQuestions = allQuestions.slice(startIdx, endIdx);
        
        if(timerInterval) clearInterval(timerInterval);
        
        saveProgress();
        document.getElementById('resultView').classList.add('hidden');
        document.getElementById('quizView').classList.remove('hidden');
        renderQuestion();
        toggleSidebar();
    }

    function startExamMode() {
        if(allQuestions.length === 0) return alert("題庫未載入！");
        
        let confirmStart = confirm("即將開始 60 分鐘模擬考，中途交卷或超時將自動結算成績。確定開始嗎？");
        if(!confirmStart) return;

        state.mode = 'exam';
        state.examFinished = false;
        state.currentIndex = 0;
        state.answers = {};
        state.examEndTime = new Date().getTime() + (60 * 60 * 1000); 
        
        let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        currentQuestions = shuffled.slice(0, 100);
        
        saveProgress();
        document.getElementById('resultView').classList.add('hidden');
        document.getElementById('quizView').classList.remove('hidden');
        
        startTimer();
        renderQuestion();
        toggleSidebar();
    }

    // === 考試計時器 ===
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('timerContainer').classList.remove('hidden');
        
        timerInterval = setInterval(() => {
            let now = new Date().getTime();
            let distance = state.examEndTime - now;
            
            if (distance <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timerText').innerText = "⏳ 考試結束";
                alert("⏳ 考試時間已到！系統將自動為您交卷並結算成績。");
                showResults();
                return;
            }
            
            let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById('timerText').innerText = `⏳ 剩餘時間: ${minutes}分 ${seconds < 10 ? '0':''}${seconds}秒`;
        }, 1000);
    }

    // === 渲染畫面 ===
    function renderQuestion() {
        if (state.currentIndex >= currentQuestions.length) {
            showResults();
            return;
        }

        const qData = currentQuestions[state.currentIndex];
        
        if (state.mode === 'exam' && !state.examFinished) {
            document.getElementById('timerContainer').classList.remove('hidden');
        } else {
            document.getElementById('timerContainer').classList.add('hidden');
        }

        let prefix = state.mode === 'exam' ? "模擬考" : "練習";
        document.getElementById('qNum').innerText = `【${prefix}】 第 ${state.currentIndex + 1} 題 (原題號:${qData['題號']})`;
        document.getElementById('qText').innerText = qData['題目'];

        const container = document.getElementById('optionsContainer');
        container.innerHTML = ""; 

        const options = { 'A': qData['選擇A'], 'B': qData['選擇B'], 'C': qData['選擇C'], 'D': qData['選擇D'] };
        const correctAns = (qData['答案'] || "").trim().toUpperCase();
        const userAns = state.answers[state.currentIndex];

        const showCorrectness = (state.mode === 'practice') || (state.mode === 'exam' && state.examFinished);

        for (let [key, val] of Object.entries(options)) {
            let btn = document.createElement('button');
            btn.className = "option-btn";
            
            if (showCorrectness) {
                if (userAns) { 
                    btn.classList.add("opt-disabled");
                    if (key === correctAns) {
                        btn.classList.add("opt-correct");
                        btn.innerHTML = `✅ ${key}. ${val}`;
                    } else if (key === userAns && userAns !== correctAns) {
                        btn.classList.add("opt-wrong");
                        btn.innerHTML = `❌ ${key}. ${val}`;
                    } else {
                        btn.innerHTML = `&nbsp;&nbsp;&nbsp;${key}. ${val}`; 
                    }
                } else {
                    btn.classList.add("opt-center");
                    btn.innerHTML = `${key}. ${val}`;
                    if(!state.examFinished) btn.onclick = () => selectOption(key);
                }
            } else {
                if (key === userAns) {
                    btn.classList.add("opt-selected");
                    btn.innerHTML = `🔘 ${key}. ${val}`;
                } else {
                    btn.classList.add("opt-center");
                    btn.innerHTML = `${key}. ${val}`;
                }
                btn.onclick = () => selectOption(key); 
            }
            container.appendChild(btn);
        }

        document.getElementById('btnPrev').style.visibility = state.currentIndex > 0 ? "visible" : "hidden";
        
        const btnNext = document.getElementById('btnNext');
        if (state.currentIndex < currentQuestions.length - 1) {
            btnNext.innerText = "下一題 ➡️";
            btnNext.onclick = nextQuestion;
        } else {
            if (state.mode === 'exam' && !state.examFinished) {
                btnNext.innerText = "正式交卷 🏆";
            } else {
                btnNext.innerText = "查看成績 🏆";
            }
            btnNext.onclick = showResults;
        }

        const total = currentQuestions.length;
        const current = state.currentIndex + 1;
        document.getElementById('progressText').innerText = `進度： ${current} / ${total}`;
        document.getElementById('progressBar').style.width = `${(current / total) * 100}%`;
    }

    function selectOption(choice) {
        state.answers[state.currentIndex] = choice;
        saveProgress(); 
        
        if (state.mode === 'practice') {
            renderQuestion();
        } else {
            renderQuestion(); 
        }
    }

    function prevQuestion() {
        if (state.currentIndex > 0) {
            state.currentIndex--;
            saveProgress();
            renderQuestion();
        }
    }

    function nextQuestion() {
        if (state.currentIndex < currentQuestions.length - 1) {
            state.currentIndex++;
            saveProgress();
            renderQuestion();
        }
    }

    // === 成績結算 ===
    function showResults() {
        if (state.mode === 'exam' && !state.examFinished) {
            let confirmSubmit = confirm("確定要交卷結算成績嗎？交卷後將無法修改答案。");
            if (!confirmSubmit && new Date().getTime() < state.examEndTime) return; 
            
            state.examFinished = true;
            if(timerInterval) clearInterval(timerInterval);
            saveProgress();
        }

        document.getElementById('quizView').classList.add('hidden');
        document.getElementById('resultView').classList.remove('hidden');

        document.getElementById('resultTitle').innerText = state.mode === 'exam' ? "🏆 模擬考結算成績" : "🎉 練習結束！";

        let score = 0;
        let total = currentQuestions.length;
        let reportHTML = "";

        currentQuestions.forEach((qData, idx) => {
            let userAns = state.answers[idx];
            let correctAns = (qData['答案'] || "").trim().toUpperCase();
            
            let jumpLink = `<a href="javascript:void(0)" onclick="jumpToQuestion(${idx})" style="color:#3b82f6; text-decoration:none; font-size:14px; float:right;">🔍 查看此題</a>`;

            if (userAns === correctAns) {
                score++;
                reportHTML += `<div class="result-box result-correct"><b>第 ${idx + 1} 題 (原題號:${qData['題號']})：✅ 答對</b> ${jumpLink}</div>`;
            } else if (!userAns) {
                reportHTML += `<div class="result-box result-miss"><b>第 ${idx + 1} 題 (原題號:${qData['題號']})：⚠️ 未作答</b> ${jumpLink}<br><span style="color:#a0a0a0;">正確答案：${correctAns}</span></div>`;
            } else {
                reportHTML += `<div class="result-box result-wrong"><b>第 ${idx + 1} 題 (原題號:${qData['題號']})：❌ 答錯</b> ${jumpLink}<br><span style="color:#a0a0a0;">你的選擇：${userAns} | 正確答案：${correctAns}</span></div>`;
            }
        });

        document.getElementById('scoreText').innerText = `${score} / ${total}`;
        document.getElementById('percentText').innerText = `${((score/total)*100).toFixed(1)}%`;
        document.getElementById('reportContainer').innerHTML = reportHTML;
    }

    function viewLastQuestion() {
        state.currentIndex = 0; 
        saveProgress();
        document.getElementById('resultView').classList.add('hidden');
        document.getElementById('quizView').classList.remove('hidden');
        renderQuestion();
    }
    
    function jumpToQuestion(idx) {
        state.currentIndex = idx;
        saveProgress();
        document.getElementById('resultView').classList.add('hidden');
        document.getElementById('quizView').classList.remove('hidden');
        renderQuestion();
    }
</script>

</body>
</html>
